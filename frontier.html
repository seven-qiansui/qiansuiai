var articleData={};

// 筛选
function initFilters(){
  var btns=document.querySelectorAll('.log-filters .filter-btn');
  var cards=document.querySelectorAll('.frontier-card[data-category]');
  if(!btns.length||!cards.length)return;
  var defaultFilter='news';
  cards.forEach(function(c){
    var cat=c.getAttribute('data-category');
    if(cat!==defaultFilter){c.style.display='none';}
  });
  btns.forEach(function(b){b.addEventListener('click',function(){
    var f=b.getAttribute('data-filter');
    btns.forEach(function(x){x.classList.remove('active')});b.classList.add('active');
    cards.forEach(function(c){
      var cat=c.getAttribute('data-category');
      if(f==='all'||cat===f){c.style.display='';c.classList.remove('visible');requestAnimationFrame(function(){c.classList.add('visible')});}
      else{c.style.display='none';}
    });
  });});
}

// 动态渲染新闻卡片
function renderNewsCards(newsItems){
  var grid=document.getElementById('frontierGrid');
  if(!grid)return;
  grid.innerHTML='';
  var dayClass=['reveal-d1','reveal-d2','reveal-d3'];
  newsItems.forEach(function(n,i){
    var div=document.createElement('div');
    div.className='frontier-card reveal clickable '+dayClass[i%3];
    div.setAttribute('data-category',n.cat);
    div.setAttribute('data-article-id','fw-dynamic-'+i);
    div.innerHTML='<h4>'+n.title+'</h4><p>'+n.summary+'</p><div class="frontier-meta"><span>今日</span><span>'+n.reads+' 阅读</span></div>';
    grid.appendChild(div);
  });
  initFilters();
  var clickableCards=document.querySelectorAll('.frontier-card[data-article-id]');
  clickableCards.forEach(function(card){
    card.style.cursor='pointer';
    card.addEventListener('click',function(){
      openArticleModal(card.getAttribute('data-article-id'));
    });
  });
  setTimeout(function(){
    document.querySelectorAll('.frontier-card.reveal').forEach(function(el){
      el.classList.add('visible');
    });
  },100);
}

// 加载前沿新闻 - 通过 AI API 每日生成
function loadFrontierNews(){
  var cacheKey='frontier_cache';
  var cacheDateKey='frontier_cache_date';
  var cached=localStorage.getItem(cacheKey);
  var cacheDate=localStorage.getItem(cacheDateKey);
  var today=new Date().toISOString().slice(0,10); // YYYY-MM-DD

  // 检查缓存是否今天有效
  if(cached&&cacheDate===today){
    try{
      var news=JSON.parse(cached);
      renderNewsCards(news);
      return;
    }catch(e){}
  }

  // 缓存过期或无缓存，调用 AI 生成
  var API_URL='/api/v1/chat/completions';
  var API_KEY=''; // Key is handled by Nginx proxy

  var prompt='今天是'+today+'。请生成今天最新的 AI 行业资讯，共 14 条。要求：\n';
  prompt+='1. 包含 4 个分类：news(快讯)、model(模型更新)、update(行业动态)、observe(观察分析)\n';
  prompt+='2. 每个分类至少 3 条\n';
  prompt+='3. 内容要真实可信，反映 2026 年 4 月 AI 行业真实进展\n';
  prompt+='4. 标题要有吸引力但不夸张\n';
  prompt+='5. 摘要 20-40 字\n';
  prompt+='6. 阅读量数据合理（500-5000 之间）\n';
  prompt+='请严格按以下 JSON 格式输出，不要输出任何其他内容：\n';
  prompt+='[\n{"cat":"news","title":"标题","summary":"摘要","reads":"1.2k"},\n...\n]';

  fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'qwen3.6-plus',
      messages:[
        {role:'system',content:'你是一个 AI 行业资讯编辑。每天收集最新的 AI 行业动态、模型发布、政策变化和行业分析。输出纯 JSON 格式。'},
        {role:'user',content:prompt}
      ],
      temperature:0.8
    })
  })
  .then(function(r){
    if(!r.ok)throw new Error('API 请求失败');
    return r.json();
  })
  .then(function(data){
    var content=data.choices[0].message.content;
    // 提取 JSON
    var start=content.indexOf('[');
    var end=content.lastIndexOf(']');
    if(start===-1||end===-1)throw new Error('JSON 解析失败');
    var news=JSON.parse(content.slice(start,end+1));
    // 缓存
    localStorage.setItem(cacheKey,JSON.stringify(news));
    localStorage.setItem(cacheDateKey,today);
    renderNewsCards(news);
  })
  .catch(function(err){
    console.warn('AI 资讯加载失败，使用默认数据:',err);
    renderNewsCards(getDefaultNews());
  });
}

var articleModal=document.getElementById('articleModal');
var articleCat=document.getElementById('articleCat');
var articleTitle=document.getElementById('articleTitle');
var articleMeta=document.getElementById('articleMeta');
var articleCover=document.getElementById('articleCover');
var articleBody=document.getElementById('articleBody');

function openArticleModal(id){
  var d=articleData[id];
  if(!d||!articleModal)return;
  var catLabel={news:'快讯',model:'模型',update:'动态',observe:'观察'}[d.cat]||'前沿';
  articleCat.textContent=catLabel;
  articleCat.className='article-cat '+d.cat;
  articleTitle.textContent=d.title;
  articleMeta.textContent=d.date+' · '+d.readTime;
  articleCover.innerHTML=d.cover?d.cover:'';
  articleBody.innerHTML=d.body;
  articleModal.classList.add('active');
  document.body.style.overflow='hidden';
}
function closeArticleModal(){
  if(!articleModal)return;
  articleModal.classList.remove('active');
  document.body.style.overflow='';
}
if(articleModal){
  articleModal.addEventListener('click',function(e){
    if(e.target===articleModal)closeArticleModal();
  });
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeArticleModal();
});
