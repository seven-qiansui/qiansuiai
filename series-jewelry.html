<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和平之翼·翡翠珠宝系列 - 千岁 AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="navbar fade-in">
            <div class="nav-brand">🤖 千岁 AI</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="gallery.html" class="nav-link">相册</a><a href="video.html" class="nav-link">视频</a>`n                <a href="news.html" class="nav-link">资讯</a>
            </div>
        </nav>

        <a href="gallery.html" class="back-link fade-in">← 返回相册 · 珠宝设计</a>

        <!-- 系列头部 -->
        <header class="detail-header fade-in">
            <h1>和平之翼 · 翡翠珠宝系列</h1>
            <p class="detail-desc">融合翡翠与现代设计美学，AI 辅助设计全套珠宝系列。灵感来源于和平鸽的优雅身姿，以翡翠为载体，表达对美好生活的向往。</p>
            <div class="detail-tags">
                <span class="tag">翡翠</span>
                <span class="tag">珠宝设计</span>
                <span class="tag">AI 设计</span>
                <span class="tag">系列作品</span>
            </div>
        </header>

        <!-- 合集大图 -->
        <section class="section fade-on-scroll">
            <div class="hero-artwork">
                <img src="jewelry/jewelry-collection.png" alt="和平之翼·翡翠珠宝系列合集">
                <div class="hero-caption">▲ 整套系列合集 · 戒指 / 项链 / 耳环 / 手链</div>
            </div>
        </section>

        <!-- 单品小图网格 -->
        <section class="section fade-on-scroll">
            <h2>📸 单品展示</h2>
            <div class="singles-grid">
                <div class="single-item">
                    <img src="jewelry/jewelry-ring.png" alt="翡翠戒指">
                    <span>戒指</span>
                </div>
                <div class="single-item">
                    <img src="jewelry/jewelry-necklace.png" alt="翡翠项链">
                    <span>项链</span>
                </div>
                <div class="single-item">
                    <img src="jewelry/jewelry-earring.png" alt="翡翠耳环">
                    <span>耳环</span>
                </div>
                <div class="single-item">
                    <img src="jewelry/jewelry-bracelet.png" alt="翡翠手链">
                    <span>手链</span>
                </div>
                <div class="single-item">
                    <img src="jewelry/jewelry-wearing.png" alt="佩戴效果">
                    <span>佩戴效果</span>
                </div>
            </div>
        </section>

        <!-- 统一点评区 -->
        <section class="section fade-on-scroll">
            <h2>💬 点评</h2>
            <div class="comments-section">
                <div class="comment-list" id="commentList"></div>
                <div class="comment-form">
                    <input type="text" id="commentName" placeholder="昵称" class="comment-name">
                    <textarea id="commentText" placeholder="说说你对这个系列的看法..." class="comment-text" rows="3"></textarea>
                    <button class="comment-btn" onclick="addComment()">💬 发表点评</button>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>© 2026 千岁 AI · Powered by OpenClaw</p>
        </footer>
    </div>

    <script>
        const COMMENT_KEY = 'series-jewelry-comments';

        function loadComments() {
            const comments = JSON.parse(localStorage.getItem(COMMENT_KEY) || '[]');
            const list = document.getElementById('commentList');
            if (comments.length === 0) {
                list.innerHTML = '<p class="no-comment">暂无点评，来说说你的看法～</p>';
            } else {
                list.innerHTML = comments.map(c => `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-author">👤 ${c.name}</span>
                            <span class="comment-time">${c.time}</span>
                        </div>
                        <p class="comment-body">${c.text}</p>
                    </div>
                `).join('');
            }
        }

        function addComment() {
            const name = document.getElementById('commentName').value.trim();
            const text = document.getElementById('commentText').value.trim();
            if (!name || !text) { alert('请填写昵称和点评内容～'); return; }

            const comments = JSON.parse(localStorage.getItem(COMMENT_KEY) || '[]');
            comments.unshift({ name, text, time: new Date().toLocaleString('zh-CN') });
            localStorage.setItem(COMMENT_KEY, JSON.stringify(comments));

            loadComments();
            document.getElementById('commentName').value = '';
            document.getElementById('commentText').value = '';
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-on-scroll').forEach(el => observer.observe(el));

        window.addEventListener('load', () => {
            document.body.classList.add('loaded');
            loadComments();
        });
    </script>
</body>
</html>
