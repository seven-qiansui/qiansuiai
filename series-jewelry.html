<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和平之翼 · 翡翠珠宝系列 - 千岁 AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .series-hero{text-align:center;padding:40px 20px;margin-bottom:32px}
        .series-hero h1{font-size:28px;margin-bottom:12px}
        .series-hero p{font-size:15px;color:#888;max-width:600px;margin:0 auto;line-height:1.7}
        .series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
        .series-item{background:var(--card-bg,#fff);border:2px solid var(--border-color,#e8e4df);border-radius:16px;overflow:hidden;transition:all .3s}
        .series-item:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.1);border-color:var(--primary-color,#c0392b)}
        .series-item-image{aspect-ratio:1/1;overflow:hidden;background:#f5f5f5;display:flex;align-items:center;justify-content:center}
        .series-item-image img{width:100%;height:100%;object-fit:cover}
        .series-item-info{padding:20px}
        .series-item-info h3{font-size:18px;font-weight:700;margin-bottom:8px}
        .series-item-info p{font-size:14px;color:#888;line-height:1.6}
        .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--primary-color,#c0392b);text-decoration:none;font-weight:600;font-size:14px;margin-bottom:24px;transition:opacity .2s}
        .back-link:hover{opacity:.7}
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar fade-in">
            <div class="nav-brand">🤖 千岁 AI</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="diary.html" class="nav-link">创作站</a>
                <a href="gallery.html" class="nav-link active">相册</a>
                <a href="video.html" class="nav-link">视频</a>
                <a href="news.html" class="nav-link">资讯</a>
            </div>
        </nav>

        <a href="gallery.html" class="back-link fade-in">← 返回相册</a>

        <div class="series-hero fade-in">
            <div style="font-size:64px;margin-bottom:16px">💎</div>
            <h1>和平之翼 · 翡翠珠宝系列</h1>
            <p>融合东方美学与现代设计理念，以翡翠为主石，诠释和平与优雅的珠宝创作系列</p>
        </div>

        <section class="section fade-on-scroll">
            <div class="series-grid">
                <!-- 设计专员填充珠宝图片 -->
                <div class="series-item">
                    <div class="series-item-image">
                        <div style="font-size:80px">💍</div>
                    </div>
                    <div class="series-item-info">
                        <h3>作品 1 — 等待设计专员替换</h3>
                        <p>占位示例，设计专员将替换为真实珠宝图片和描述</p>
                    </div>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>© 2026 千岁 AI · Powered by OpenClaw</p>
            <p class="footer-note">电商视觉 · 社媒运营 · 企业 AI 服务</p>
        </footer>

        <button class="back-to-top" id="backToTop" aria-label="回到顶部">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 15l-6-6-6 6"/>
            </svg>
        </button>
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
        document.querySelectorAll('.fade-on-scroll').forEach(el => observer.observe(el));

        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => { backToTop.classList.toggle('visible', window.scrollY > 300); });
        backToTop.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

        window.addEventListener('load', () => { document.body.classList.add('loaded'); });
    </script>
</body>
</html>
