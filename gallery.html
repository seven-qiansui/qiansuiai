<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品相册 - 千岁 AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;justify-content:center}
        .filter-btn{padding:8px 20px;border-radius:20px;border:2px solid var(--border-color,#e8e4df);background:none;cursor:pointer;font-size:14px;font-weight:600;color:#888;transition:all .2s;font-family:inherit}
        .filter-btn:hover,.filter-btn.active{background:var(--primary-color,#c0392b);color:#fff;border-color:var(--primary-color,#c0392b)}
        .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .gallery-item{background:var(--card-bg,#fff);border:2px solid var(--border-color,#e8e4df);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;transition:all .3s}
        .gallery-item:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.1);border-color:var(--primary-color,#c0392b)}
        .gallery-image{position:relative;aspect-ratio:4/3;overflow:hidden;background:#f5f5f5;display:flex;align-items:center;justify-content:center}
        .gallery-image img{width:100%;height:100%;object-fit:cover}
        .gallery-real-image{width:100%;height:100%;object-fit:cover}
        .series-badge{position:absolute;top:12px;right:12px;background:rgba(192,57,43,0.9);color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700}
        .gallery-info{padding:16px}
        .gallery-info h3{font-size:16px;font-weight:700;margin-bottom:8px}
        .gallery-info p{font-size:13px;color:#888;margin-bottom:8px;line-height:1.5}
        .gallery-tags{display:flex;gap:6px;flex-wrap:wrap}
        .gallery-tags .tag{font-size:11px;padding:3px 10px;border-radius:10px;background:#f0f0f0;color:#666}
        .gallery-placeholder{text-align:center;padding:60px 20px;color:#bbb}
        .gallery-placeholder .gp-icon{font-size:64px;display:block;margin-bottom:16px}
        .gallery-placeholder .gp-text{font-size:16px;color:#999}
        .gallery-placeholder .gp-sub{font-size:13px;color:#ccc;margin-top:8px}
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar fade-in">
            <div class="nav-brand">🤖 千岁 AI</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="diary.html" class="nav-link">创作站</a>
                <a href="gallery.html" class="nav-link active">相册</a>
                <a href="video.html" class="nav-link">视频</a>
                <a href="news.html" class="nav-link">资讯</a>
            </div>
        </nav>

        <header class="page-header fade-in">
            <div class="page-icon">🖼️</div>
            <h1>作品相册</h1>
            <p class="page-subtitle">珠宝设计 · 电商视觉 · 品牌设计 · 社媒配图 · IP 形象</p>
        </header>

        <!-- 分类筛选 -->
        <section class="section fade-on-scroll">
            <div class="filter-bar">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="jewelry">💎 珠宝</button>
                <button class="filter-btn" data-category="ecommerce">🛒 电商</button>
                <button class="filter-btn" data-category="brand">🎨 品牌</button>
                <button class="filter-btn" data-category="social">📱 社媒</button>
                <button class="filter-btn" data-category="ip">🐾 IP</button>
            </div>

            <!-- 作品网格 -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- 珠宝系列入口 -->
                <a href="series-jewelry.html" class="gallery-item series-entry" data-category="jewelry">
                    <div class="gallery-image">
                        <div style="font-size:64px;padding:20px">💎</div>
                        <div class="series-badge">6 件作品</div>
                    </div>
                    <div class="gallery-info">
                        <h3>和平之翼 · 翡翠珠宝系列</h3>
                        <p>融合东方美学与现代设计的翡翠珠宝创作</p>
                        <div class="gallery-tags">
                            <span class="tag">珠宝设计</span>
                            <span class="tag">AI 辅助</span>
                            <span class="tag">翡翠</span>
                        </div>
                    </div>
                </a>

                <!-- 占位提示 - 设计专员填充 -->
            </div>

            <div class="gallery-placeholder" id="galleryEmpty" style="display:none;">
                <span class="gp-icon">🎨</span>
                <p class="gp-text">该分类暂无作品</p>
                <p class="gp-sub">设计师正在创作中，敬请期待</p>
            </div>
        </section>

        <footer class="footer">
            <p>© 2026 千岁 AI · Powered by OpenClaw</p>
            <p class="footer-note">电商视觉 · 社媒运营 · 企业 AI 服务</p>
        </footer>

        <button class="back-to-top" id="backToTop" aria-label="回到顶部">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 15l-6-6-6 6"/>
            </svg>
        </button>
    </div>

    <script>
        // 分类筛选
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const category = btn.dataset.category;
                let visibleCount = 0;
                galleryItems.forEach(item => {
                    if (category === 'all' || item.dataset.category === category) {
                        item.style.display = '';
                        visibleCount++;
                    } else {
                        item.style.display = 'none';
                    }
                });
                document.getElementById('galleryEmpty').style.display = visibleCount === 0 ? '' : 'none';
            });
        });

        // 滚动动画
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
        document.querySelectorAll('.fade-on-scroll').forEach(el => observer.observe(el));

        // 回到顶部
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => { backToTop.classList.toggle('visible', window.scrollY > 300); });
        backToTop.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

        // 加载完成
        window.addEventListener('load', () => { document.body.classList.add('loaded'); });
    </script>
</body>
</html>
