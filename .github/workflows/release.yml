name: Release - 自动版本发布

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: |
            {
              "categories": [
                {
                  "title": "## 🎉 新功能",
                  "labels": ["feature", "enhancement"]
                },
                {
                  "title": "## 🐛 Bug 修复",
                  "labels": ["bug", "fix"]
                },
                {
                  "title": "## 📝 文档",
                  "labels": ["documentation"]
                },
                {
                  "title": "## ⚡ 性能优化",
                  "labels": ["performance"]
                },
                {
                  "title": "## 🔄 其他变更",
                  "labels": []
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
