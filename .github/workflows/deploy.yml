name: Deploy to Aliyun
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ALIYUN_HOST }} >> ~/.ssh/known_hosts

      - name: Clean remote
        run: |
          ssh ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} \
            "find /var/www/qiansuiai.cn/current -mindepth 1 -delete"

      - name: Sync files
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='proxy-server.js' \
            --exclude='proxy.php' \
            --exclude='.claude' \
            --exclude='CLAUDE.md' \
            --exclude='*.md' \
            ./ \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:/var/www/qiansuiai.cn/current/

      - name: Verify deployment
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${{ secrets.ALIYUN_HOST }}/index.html")
          if [ "$STATUS" != "200" ]; then
            echo "Deploy failed! Server returned $STATUS"
            exit 1
          fi
          echo "Deploy verified! Server returned 200 OK"
