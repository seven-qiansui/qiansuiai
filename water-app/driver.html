<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>来点好水 · 配送员</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--b:#3B82F6;--bd:#2563EB;--bl:#EFF6FF;--bg:linear-gradient(135deg,#60A5FA,#2563EB);--g:#10B981;--gg:linear-gradient(135deg,#34D399,#059669);--o:#F59E0B;--r:#EF4444;--f:#F1F5F9;--w:#FFF;--t:#1E293B;--s:#64748B;--m:#94A3B8;--ln:#E2E8F0;--rd:14px;--sh:0 2px 12px rgba(0,0,0,.05)}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:var(--f);color:var(--t);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.hd{background:var(--bg);padding:16px 20px 22px;position:relative;overflow:hidden}.hd::after{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.hd-info{display:flex;align-items:center;gap:12px;color:#fff}.hd-av{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:22px}
.hd-nm{font-size:16px;font-weight:700}.hd-sub{font-size:12px;opacity:.75;margin-top:2px}
.on-btn{padding:8px 18px;border-radius:20px;font-size:13px;border:none;cursor:pointer;font-weight:700;transition:.2s}.on-btn.on{background:var(--g);color:#fff;box-shadow:0 2px 10px rgba(16,185,129,.3)}.on-btn.off{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8)}
.hd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.hs{text-align:center;color:#fff}.hs-n{font-size:24px;font-weight:800}.hs-l{font-size:11px;opacity:.75;margin-top:2px}
.tabs{display:flex;background:var(--w);border-bottom:1px solid var(--ln);position:sticky;top:0;z-index:10}
.tab{flex:1;text-align:center;padding:14px 0;font-size:14px;color:var(--m);cursor:pointer;position:relative;transition:.2s;font-weight:500}.tab.on{color:var(--b);font-weight:700}.tab.on::after{content:'';position:absolute;bottom:0;left:30%;right:30%;height:3px;background:var(--b);border-radius:2px}
.tab .bd{display:inline-block;background:var(--r);color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;line-height:16px;margin-left:4px;padding:0 4px;font-weight:700;vertical-align:top}
.olist{padding:12px}
.oc{background:var(--w);border-radius:var(--rd);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh)}
.oc-urg{background:linear-gradient(135deg,#FEF3C7,#FDE68A);padding:8px 16px;font-size:12px;color:#92400E;font-weight:600}
.oc-hd{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}.oc-id{font-size:13px;color:var(--m);font-weight:500}.oc-time{font-size:12px;color:var(--m)}
.oc-bd{padding:0 16px 14px}
.oc-cust{display:flex;align-items:center;gap:8px;margin-bottom:8px}.oc-nm{font-size:15px;font-weight:700}.oc-ph{background:var(--bl);color:var(--bd);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.oc-addr{font-size:13px;color:var(--s);margin-bottom:10px;line-height:1.5}
.oc-prods{background:#F8FAFC;border-radius:10px;padding:12px;margin-bottom:10px}.oc-pr{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}.oc-pr.total{margin-top:6px;padding-top:6px;border-top:1px dashed var(--ln)}.oc-pr.total span:last-child{color:var(--r);font-weight:800}
.oc-note{background:#FEF3C7;border-radius:8px;padding:10px 12px;font-size:12px;color:#92400E;font-weight:500;margin-bottom:10px}
.oc-ft{padding:12px 16px;border-top:1px solid var(--ln);display:flex;gap:8px}
.ob{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;text-align:center;transition:.15s}.ob:active{transform:scale(.96)}
.ob-nav{background:#D1FAE5;color:#065F46}.ob-call{background:var(--bl);color:var(--bd)}.ob-go{background:var(--bg);color:#fff;box-shadow:0 2px 10px rgba(59,130,246,.2)}.ob-done{background:var(--gg);color:#fff;box-shadow:0 2px 10px rgba(16,185,129,.2)}.ob-gray{background:#F1F5F9;color:var(--m)}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 16px;color:var(--m)}.empty .ic{font-size:48px;margin-bottom:12px;opacity:.5}.empty .tx{font-size:14px}
/* Confirm modal */
.cmo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;max-width:430px;margin:0 auto;backdrop-filter:blur(2px)}.cmo.show{display:flex;align-items:flex-end}
.cmo-c{width:100%;background:var(--w);border-radius:20px 20px 0 0;padding:28px 20px 36px;animation:su .3s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cmo-t{font-size:18px;font-weight:800;margin-bottom:20px;text-align:center}.cmo-sec{margin-bottom:20px}.cmo-lb{font-size:13px;color:var(--s);margin-bottom:10px;font-weight:600}
.btl-c{display:flex;align-items:center;gap:20px;justify-content:center}.btl-b{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--ln);background:var(--w);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}.btl-b:active{background:var(--f)}.btl-n{font-size:32px;font-weight:800;min-width:40px;text-align:center}
.photo-up{border:2px dashed var(--ln);border-radius:var(--rd);height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--m);font-size:13px}.photo-up .ic{font-size:28px}
.cmo-btns{display:flex;gap:10px;margin-top:24px}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:60px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);display:flex;box-shadow:0 -1px 16px rgba(0,0,0,.06);z-index:50}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--m);font-size:10px}.bn.on{color:var(--b)}.bn .ic{font-size:20px}
.dp{display:none;padding-bottom:60px}.dp.on{display:block}
/* Income */
.inc-hd{background:var(--gg);padding:28px 20px;color:#fff;text-align:center;position:relative;overflow:hidden}.inc-hd::after{content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06)}
.inc-tl{font-size:13px;opacity:.8}.inc-v{font-size:46px;font-weight:800;margin:8px 0}.inc-v .u{font-size:16px;font-weight:400}
.inc-det{display:flex;justify-content:center;gap:36px;margin-top:8px}.inc-di{text-align:center}.inc-di-n{font-size:18px;font-weight:700}.inc-di-l{font-size:11px;opacity:.75}
.inc-list{padding:16px}.inc-item{background:var(--w);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.inc-item-id{font-size:12px;color:var(--m)}.inc-item-info{font-size:14px;margin-top:4px;font-weight:500}.inc-item-am{font-size:16px;font-weight:800;color:var(--g)}
/* My */
.my-menu{margin:16px;background:var(--w);border-radius:var(--rd);overflow:hidden;box-shadow:var(--sh)}
.my-mi{display:flex;align-items:center;padding:15px 18px;border-bottom:1px solid var(--ln);cursor:pointer;font-size:14px}.my-mi:last-child{border:none}.my-mi:active{background:#F8FAFC}.my-mi .ic{font-size:18px;margin-right:12px;width:24px;text-align:center}.my-mi .tx{flex:1}.my-mi .ar{color:var(--m);font-size:12px}
.toast{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);background:rgba(15,23,42,.82);color:#fff;padding:14px 28px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;backdrop-filter:blur(8px)}.toast.show{opacity:1}
</style>
</head>
<body>
<div class="dp on" id="dp-del">
  <div class="hd">
    <div class="hd-top"><div class="hd-info"><div class="hd-av">🚚</div><div><div class="hd-nm">小陈</div><div class="hd-sub">配送员 · 翠苑片区</div></div></div><button class="on-btn on" id="onBtn" onclick="togOn()">● 在线接单</button></div>
    <div class="hd-stats"><div class="hs"><div class="hs-n" id="sPend">0</div><div class="hs-l">待配送</div></div><div class="hs"><div class="hs-n" id="sDone">0</div><div class="hs-l">已完成</div></div><div class="hs"><div class="hs-n" id="sBtl">0</div><div class="hs-l">回收桶</div></div><div class="hs"><div class="hs-n" id="sInc">¥0</div><div class="hs-l">今日收入</div></div></div>
  </div>
  <div class="tabs"><div class="tab on" onclick="sTab(0)">待配送<span class="bd" id="pBd">0</span></div><div class="tab" onclick="sTab(1)">配送中</div><div class="tab" onclick="sTab(2)">已完成</div></div>
  <div class="olist" id="oList"></div>
</div>
<div class="dp" id="dp-inc"><div class="inc-hd"><div class="inc-tl">今日收入</div><div class="inc-v"><span class="u">¥</span><span id="incTotal">0</span></div><div class="inc-det"><div class="inc-di"><div class="inc-di-n" id="incOrd">0</div><div class="inc-di-l">配送单</div></div><div class="inc-di"><div class="inc-di-n">¥3</div><div class="inc-di-l">每单</div></div><div class="inc-di"><div class="inc-di-n" id="incBtl">0</div><div class="inc-di-l">回收桶</div></div></div></div><div class="inc-list" id="incList"></div></div>
<div class="dp" id="dp-my">
  <div class="hd" style="padding-bottom:28px"><div style="display:flex;align-items:center;gap:14px;color:#fff"><div class="hd-av" style="width:60px;height:60px;font-size:28px">🚚</div><div><div class="hd-nm" style="font-size:19px">小陈</div><div class="hd-sub">工号 PS-006 · 翠苑片区</div></div></div></div>
  <div style="padding:16px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px"><div style="background:var(--w);border-radius:var(--rd);padding:18px;text-align:center;box-shadow:var(--sh)"><div style="font-size:30px;font-weight:800;color:var(--b)" id="myTotal">0</div><div style="font-size:12px;color:var(--m);margin-top:4px">累计配送(单)</div></div><div style="background:var(--w);border-radius:var(--rd);padding:18px;text-align:center;box-shadow:var(--sh)"><div style="font-size:30px;font-weight:800;color:var(--g)" id="myInc">¥0</div><div style="font-size:12px;color:var(--m);margin-top:4px">累计收入</div></div></div>
  <div class="my-menu"><div class="my-mi"><span class="ic">📊</span><span class="tx">配送统计</span><span class="ar">▸</span></div><div class="my-mi"><span class="ic">💰</span><span class="tx">收入明细</span><span class="ar">▸</span></div><div class="my-mi"><span class="ic">🪣</span><span class="tx">空桶回收记录</span><span class="ar">▸</span></div><div class="my-mi"><span class="ic">📞</span><span class="tx">联系商家</span><span class="ar">▸</span></div><div class="my-mi"><span class="ic">⚙️</span><span class="tx">设置</span><span class="ar">▸</span></div></div></div>
</div>
<div class="cmo" id="cfmMo"><div class="cmo-c"><div class="cmo-t">确认送达</div><div class="cmo-sec"><div class="cmo-lb">🪣 回收空桶数量</div><div class="btl-c"><button class="btl-b" onclick="chgBtl(-1)">−</button><div class="btl-n" id="btlN">0</div><button class="btl-b" onclick="chgBtl(1)">+</button></div></div><div class="cmo-sec"><div class="cmo-lb">📷 拍照凭证</div><div class="photo-up" onclick="toast('📷 开发中')"><span class="ic">📸</span><span>点击拍照</span></div></div><div class="cmo-btns"><button class="ob ob-gray" onclick="closeCfm()">取消</button><button class="ob ob-done" style="flex:2" onclick="cfmDel()">✅ 确认送达</button></div></div></div>
<div class="toast" id="toastEl"></div>
<div class="bnav"><div class="bn on" onclick="sPage(0)"><span class="ic">📋</span>配送</div><div class="bn" onclick="sPage(1)"><span class="ic">💰</span>收入</div><div class="bn" onclick="sPage(2)"><span class="ic">👤</span>我的</div></div>
<script src="shared.js"></script>
<script>
const MY_DRIVER='d1'; // 小陈
let aTab=0,curId=null,btlCnt=0;
function sTab(i){aTab=i;document.querySelectorAll('.tab').forEach((t,x)=>t.classList.toggle('on',x===i));rList()}
function getMyOrders(){return loadData().orders.filter(o=>o.driver===MY_DRIVER||o.status==='delivering'&&o.driver===MY_DRIVER)}
function rList(){
  const data=loadData();
  const sm={0:'delivering',1:'delivering',2:'done'};
  // 待配送=分配给我且status=delivering, 已完成=done
  let list;
  if(aTab===0)list=data.orders.filter(o=>o.driver===MY_DRIVER&&o.status==='delivering');
  else if(aTab===1)list=[];// 配送中合并到待配送
  else list=data.orders.filter(o=>o.driver===MY_DRIVER&&o.status==='done');
  const el=document.getElementById('oList');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="ic">${aTab===2?'✅':'📭'}</div><div class="tx">${aTab===2?'暂无已完成':'暂无待配送订单'}</div></div>`;updStats();return}
  el.innerHTML=list.map(o=>{
    const prods=getOrderProducts(o);
    let ft='';
    if(o.status==='delivering')ft=`<button class="ob ob-nav" onclick="toast('🗺️ 导航至: ${o.addr}')">🗺️ 导航</button><button class="ob ob-call" onclick="toast('📞 拨打客户')">📞 联系</button><button class="ob ob-done" onclick="showCfm('${o.id}')">✅ 送达</button>`;
    else ft=`<button class="ob ob-gray">回收空桶: ${o.bottles||0} 个</button>`;
    return`<div class="oc"><div class="oc-hd"><span class="oc-id">${o.id}</span><span class="oc-time">下单 ${o.time}</span></div><div class="oc-bd"><div class="oc-cust"><span class="oc-nm">${o.customer}</span><span class="oc-ph">📞 ${o.phone}</span></div><div class="oc-addr">📍 ${o.addr}</div><div class="oc-prods">${prods.map(p=>`<div class="oc-pr"><span>${p.name}</span><span style="font-weight:700">×${p.qty}</span></div>`).join('')}<div class="oc-pr total"><span>金额</span><span>¥${o.amount}</span></div></div>${o.note?`<div class="oc-note">📝 ${o.note}</div>`:''}</div><div class="oc-ft">${ft}</div></div>`}).join('');
  updStats()}
function updStats(){
  const data=loadData();
  const myDel=data.orders.filter(o=>o.driver===MY_DRIVER&&o.status==='delivering').length;
  const myDone=data.orders.filter(o=>o.driver===MY_DRIVER&&o.status==='done').length;
  const myBtl=data.orders.filter(o=>o.driver===MY_DRIVER&&o.status==='done').reduce((s,o)=>s+(o.bottles||0),0);
  document.getElementById('sPend').textContent=myDel;
  document.getElementById('sDone').textContent=myDone;
  document.getElementById('sBtl').textContent=myBtl;
  document.getElementById('sInc').textContent='¥'+(myDone*3);
  const bd=document.getElementById('pBd');bd.textContent=myDel;bd.style.display=myDel?'inline':'none';
  // My page
  document.getElementById('myTotal').textContent=myDone;
  document.getElementById('myInc').textContent='¥'+(myDone*3)}
function showCfm(id){curId=id;btlCnt=0;document.getElementById('btlN').textContent=0;document.getElementById('cfmMo').classList.add('show')}
function closeCfm(){document.getElementById('cfmMo').classList.remove('show')}
function chgBtl(d){btlCnt=Math.max(0,btlCnt+d);document.getElementById('btlN').textContent=btlCnt}
function cfmDel(){
  updateOrderStatus(curId,'done',{bottles:btlCnt});
  closeCfm();rList();toast('✅ 送达确认，回收 '+btlCnt+' 个空桶')}
function rInc(){
  const data=loadData();
  const dn=data.orders.filter(o=>o.driver===MY_DRIVER&&o.status==='done');
  const btl=dn.reduce((s,o)=>s+(o.bottles||0),0);
  document.getElementById('incTotal').textContent=dn.length*3;
  document.getElementById('incOrd').textContent=dn.length;
  document.getElementById('incBtl').textContent=btl;
  document.getElementById('incList').innerHTML=dn.map(o=>{const prods=getOrderProducts(o);return`<div class="inc-item"><div><div class="inc-item-id">${o.id}</div><div class="inc-item-info">${o.customer} · ${prods.map(p=>p.name).join('、')}</div></div><div class="inc-item-am">+¥3</div></div>`}).join('')||'<div class="empty"><div class="ic">💰</div><div class="tx">暂无收入</div></div>'}
const dps=['dp-del','dp-inc','dp-my'];
function sPage(i){dps.forEach((p,x)=>document.getElementById(p).classList.toggle('on',x===i));document.querySelectorAll('.bn').forEach((n,x)=>n.classList.toggle('on',x===i));if(i===0)rList();if(i===1)rInc()}
let isOn=true;
function togOn(){isOn=!isOn;const b=document.getElementById('onBtn');b.className='on-btn '+(isOn?'on':'off');b.textContent=isOn?'● 在线接单':'○ 离线';toast(isOn?'已上线':'已离线')}
function toast(m){const t=document.getElementById('toastEl');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}
// Sync: when admin dispatches order, auto-refresh
onDataChange(function(){rList();if(document.getElementById('dp-inc').classList.contains('on'))rInc()});
rList();
document.getElementById('cfmMo').onclick=function(e){if(e.target===this)closeCfm()};
</script>
</body>
</html>
