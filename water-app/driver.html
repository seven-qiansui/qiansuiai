<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>来点好水 · 配送员端</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#3B82F6;--blue-d:#2563EB;--blue-l:#EFF6FF;--blue-g:linear-gradient(135deg,#60A5FA,#2563EB);
  --green:#10B981;--green-g:linear-gradient(135deg,#34D399,#059669);--orange:#F59E0B;--red:#EF4444;
  --bg:#F1F5F9;--card:#FFF;--text:#1E293B;--sub:#64748B;--mute:#94A3B8;--line:#E2E8F0;
  --r:14px;--shadow:0 2px 12px rgba(0,0,0,.05);
}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}

/* Header */
.hd{background:var(--blue-g);padding:16px 20px 22px;position:relative;overflow:hidden}
.hd::after{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.hd-info{display:flex;align-items:center;gap:12px;color:#fff}
.hd-av{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:22px;backdrop-filter:blur(4px)}
.hd-nm{font-size:16px;font-weight:700}.hd-sub{font-size:12px;opacity:.75;margin-top:2px}
.on-btn{padding:8px 18px;border-radius:20px;font-size:13px;border:none;cursor:pointer;font-weight:700;transition:.2s}
.on-btn.on{background:var(--green);color:#fff;box-shadow:0 2px 10px rgba(16,185,129,.3)}
.on-btn.off{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8)}
.hd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hs{text-align:center;color:#fff}
.hs-n{font-size:24px;font-weight:800}.hs-l{font-size:11px;opacity:.75;margin-top:2px}

/* Tabs */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.tab{flex:1;text-align:center;padding:14px 0;font-size:14px;color:var(--mute);cursor:pointer;position:relative;transition:.2s;font-weight:500}
.tab.on{color:var(--blue);font-weight:700}
.tab.on::after{content:'';position:absolute;bottom:0;left:30%;right:30%;height:3px;background:var(--blue);border-radius:2px}
.tab .bd{display:inline-block;background:var(--red);color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;line-height:16px;margin-left:4px;padding:0 4px;font-weight:700;vertical-align:top}

/* Order list */
.olist{padding:12px}
.oc{background:var(--card);border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.oc-urg{background:linear-gradient(135deg,#FEF3C7,#FDE68A);padding:8px 16px;font-size:12px;color:#92400E;font-weight:600;display:flex;align-items:center;gap:4px}
.oc-hd{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.oc-id{font-size:13px;color:var(--mute);font-weight:500}.oc-time{font-size:12px;color:var(--mute)}
.oc-bd{padding:0 16px 14px}
.oc-cust{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.oc-nm{font-size:15px;font-weight:700}
.oc-ph{background:var(--blue-l);color:var(--blue-d);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.oc-addr{font-size:13px;color:var(--sub);margin-bottom:10px;display:flex;align-items:flex-start;gap:4px;line-height:1.5}
.oc-prods{background:#F8FAFC;border-radius:10px;padding:12px;margin-bottom:10px}
.oc-pr{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
.oc-pr-n{color:var(--sub)}.oc-pr-q{font-weight:700}
.oc-pr.total{margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}
.oc-pr.total span:last-child{color:var(--red);font-weight:800}
.oc-note{background:#FEF3C7;border-radius:8px;padding:10px 12px;font-size:12px;color:#92400E;font-weight:500;margin-bottom:10px}
.oc-ft{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px}
.ob{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;text-align:center;transition:.15s}
.ob:active{transform:scale(.96)}
.ob-nav{background:#D1FAE5;color:#065F46}.ob-call{background:var(--blue-l);color:var(--blue-d)}
.ob-go{background:var(--blue-g);color:#fff;box-shadow:0 2px 10px rgba(59,130,246,.2)}
.ob-done{background:var(--green-g);color:#fff;box-shadow:0 2px 10px rgba(16,185,129,.2)}
.ob-gray{background:#F1F5F9;color:var(--mute);flex:1}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 16px;color:var(--mute)}
.empty .ic{font-size:48px;margin-bottom:12px;opacity:.5}.empty .tx{font-size:14px}

/* Confirm modal */
.cmo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;max-width:430px;margin:0 auto;backdrop-filter:blur(2px)}
.cmo.show{display:flex;align-items:flex-end}
.cmo-c{width:100%;background:var(--card);border-radius:20px 20px 0 0;padding:28px 20px 36px;animation:su .3s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cmo-t{font-size:18px;font-weight:800;margin-bottom:20px;text-align:center}
.cmo-sec{margin-bottom:20px}
.cmo-lb{font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:600}
.btl-c{display:flex;align-items:center;gap:20px;justify-content:center}
.btl-b{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--line);background:var(--card);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-weight:700}
.btl-b:active{background:var(--bg);transform:scale(.9)}
.btl-n{font-size:32px;font-weight:800;min-width:40px;text-align:center}
.photo-up{border:2px dashed var(--line);border-radius:var(--r);height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--mute);font-size:13px;transition:.15s}
.photo-up:active{background:var(--bg)}
.photo-up .ic{font-size:28px}
.cmo-btns{display:flex;gap:10px;margin-top:24px}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:60px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);display:flex;box-shadow:0 -1px 16px rgba(0,0,0,.06);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--mute);font-size:10px;transition:.2s}
.bn.on{color:var(--blue)}.bn.on .ic{transform:scale(1.1)}
.bn .ic{font-size:20px;transition:.2s}

/* Pages */
.dp{display:none;padding-bottom:60px}.dp.on{display:block}

/* Income */
.inc-hd{background:var(--green-g);padding:28px 20px;color:#fff;text-align:center;position:relative;overflow:hidden}
.inc-hd::after{content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06)}
.inc-tl{font-size:13px;opacity:.8}.inc-v{font-size:46px;font-weight:800;margin:8px 0}.inc-v .u{font-size:16px;font-weight:400}
.inc-det{display:flex;justify-content:center;gap:36px;margin-top:8px}
.inc-di{text-align:center}.inc-di-n{font-size:18px;font-weight:700}.inc-di-l{font-size:11px;opacity:.75}
.inc-list{padding:16px}
.inc-item{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.inc-item-l{}.inc-item-id{font-size:12px;color:var(--mute)}.inc-item-info{font-size:14px;margin-top:4px;font-weight:500}
.inc-item-am{font-size:16px;font-weight:800;color:var(--green)}

/* My */
.my-menu{margin:16px;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.my-mi{display:flex;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14px;transition:.15s}
.my-mi:last-child{border:none}.my-mi:active{background:#F8FAFC}
.my-mi .ic{font-size:18px;margin-right:12px;width:24px;text-align:center}.my-mi .tx{flex:1}.my-mi .ar{color:var(--mute);font-size:12px}

/* Toast */
.toast{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);background:rgba(15,23,42,.82);color:#fff;padding:14px 28px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;backdrop-filter:blur(8px)}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ===== 配送页 ===== -->
<div class="dp on" id="dp-del">
  <div class="hd">
    <div class="hd-top">
      <div class="hd-info"><div class="hd-av">🚚</div><div><div class="hd-nm">小陈</div><div class="hd-sub">配送员 · 翠苑片区</div></div></div>
      <button class="on-btn on" id="onBtn" onclick="togOn()">● 在线接单</button>
    </div>
    <div class="hd-stats">
      <div class="hs"><div class="hs-n" id="sPend">3</div><div class="hs-l">待配送</div></div>
      <div class="hs"><div class="hs-n" id="sDone">2</div><div class="hs-l">已完成</div></div>
      <div class="hs"><div class="hs-n" id="sBtl">6</div><div class="hs-l">回收桶</div></div>
      <div class="hs"><div class="hs-n" id="sInc">¥6</div><div class="hs-l">今日收入</div></div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="sTab(0)">待配送<span class="bd" id="pBd">3</span></div>
    <div class="tab" onclick="sTab(1)">配送中</div>
    <div class="tab" onclick="sTab(2)">已完成</div>
  </div>
  <div class="olist" id="oList"></div>
</div>

<!-- ===== 收入页 ===== -->
<div class="dp" id="dp-inc">
  <div class="inc-hd">
    <div class="inc-tl">今日收入</div>
    <div class="inc-v"><span class="u">¥</span><span id="incTotal">6</span></div>
    <div class="inc-det">
      <div class="inc-di"><div class="inc-di-n" id="incOrd">2</div><div class="inc-di-l">配送单数</div></div>
      <div class="inc-di"><div class="inc-di-n">¥3</div><div class="inc-di-l">每单提成</div></div>
      <div class="inc-di"><div class="inc-di-n" id="incBtl">6</div><div class="inc-di-l">回收空桶</div></div>
    </div>
  </div>
  <div class="inc-list" id="incList"></div>
</div>

<!-- ===== 我的页 ===== -->
<div class="dp" id="dp-my">
  <div class="hd" style="padding-bottom:28px">
    <div style="display:flex;align-items:center;gap:14px;color:#fff">
      <div class="hd-av" style="width:60px;height:60px;font-size:28px">🚚</div>
      <div>
        <div class="hd-nm" style="font-size:19px">小陈</div>
        <div class="hd-sub">工号 PS-006 · 翠苑片区</div>
        <div class="hd-sub">入职 2025-06-15 · 服务 284 天</div>
      </div>
    </div>
  </div>
  <div style="padding:16px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div style="background:var(--card);border-radius:var(--r);padding:18px;text-align:center;box-shadow:var(--shadow)">
        <div style="font-size:30px;font-weight:800;color:var(--blue)">2,846</div>
        <div style="font-size:12px;color:var(--mute);margin-top:4px">累计配送(单)</div>
      </div>
      <div style="background:var(--card);border-radius:var(--r);padding:18px;text-align:center;box-shadow:var(--shadow)">
        <div style="font-size:30px;font-weight:800;color:var(--green)">¥8,538</div>
        <div style="font-size:12px;color:var(--mute);margin-top:4px">累计收入</div>
      </div>
    </div>
    <div class="my-menu">
      <div class="my-mi"><span class="ic">📊</span><span class="tx">配送统计</span><span class="ar">▸</span></div>
      <div class="my-mi"><span class="ic">💰</span><span class="tx">收入明细</span><span class="ar">▸</span></div>
      <div class="my-mi"><span class="ic">🪣</span><span class="tx">空桶回收记录</span><span class="ar">▸</span></div>
      <div class="my-mi"><span class="ic">📍</span><span class="tx">我的片区</span><span class="ar">▸</span></div>
      <div class="my-mi"><span class="ic">📞</span><span class="tx">联系商家</span><span class="ar">▸</span></div>
      <div class="my-mi"><span class="ic">⚙️</span><span class="tx">设置</span><span class="ar">▸</span></div>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="cmo" id="cfmMo">
  <div class="cmo-c">
    <div class="cmo-t">确认送达</div>
    <div class="cmo-sec">
      <div class="cmo-lb">🪣 回收空桶数量</div>
      <div class="btl-c"><button class="btl-b" onclick="chgBtl(-1)">−</button><div class="btl-n" id="btlN">0</div><button class="btl-b" onclick="chgBtl(1)">+</button></div>
    </div>
    <div class="cmo-sec">
      <div class="cmo-lb">📷 拍照凭证（可选）</div>
      <div class="photo-up" onclick="toast('📷 拍照功能开发中')"><span class="ic">📸</span><span>点击拍照</span></div>
    </div>
    <div class="cmo-btns">
      <button class="ob ob-gray" onclick="closeCfm()">取消</button>
      <button class="ob ob-done" style="flex:2" onclick="cfmDel()">✅ 确认送达</button>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<!-- Bottom nav -->
<div class="bnav">
  <div class="bn on" onclick="sPage(0)"><span class="ic">📋</span>配送</div>
  <div class="bn" onclick="sPage(1)"><span class="ic">💰</span>收入</div>
  <div class="bn" onclick="sPage(2)"><span class="ic">👤</span>我的</div>
</div>

<script>
let dOrds=[
  {id:'WO20260324001',c:'张先生',ph:'13800008888',ad:'翠苑一区18号楼3单元502',ps:[{n:'农夫山泉 18.9L',q:3}],am:60,t:'17:05',s:'pending',nt:'放门口即可',urg:true},
  {id:'WO20260324002',c:'李女士',ph:'13900006666',ad:'翠苑二区5号楼1单元301',ps:[{n:'百岁山 18.9L',q:2}],am:44,t:'16:48',s:'pending',nt:''},
  {id:'WO20260324003',c:'杭州XX科技',ph:'057188001234',ad:'文三路478号华星大厦8楼',ps:[{n:'怡宝 18.9L',q:8},{n:'百岁山 18.9L',q:2}],am:180,t:'16:30',s:'pending',nt:'送到前台，联系行政小王'},
  {id:'WO20260324004',c:'王先生',ph:'13700005555',ad:'古荡新村西区12幢201',ps:[{n:'娃哈哈 18.9L',q:2}],am:32,t:'15:20',s:'delivering',nt:''},
  {id:'WO20260324005',c:'赵女士',ph:'13600004444',ad:'文新路288号创意大厦3-1502',ps:[{n:'农夫山泉 18.9L',q:1}],am:20,t:'14:55',s:'delivering',nt:''},
  {id:'WO20260324006',c:'陈先生',ph:'13500003333',ad:'翠苑四区2号楼5-601',ps:[{n:'景田 18.9L',q:4}],am:96,t:'14:10',s:'done',btl:4},
  {id:'WO20260324007',c:'刘女士',ph:'13400002222',ad:'文二路125号锦绣大厦1-802',ps:[{n:'怡宝 18.9L',q:2}],am:36,t:'13:30',s:'done',btl:2}
];

let aTab=0,curId=null,btlCnt=0;

function sTab(i){aTab=i;document.querySelectorAll('.tab').forEach((t,x)=>t.classList.toggle('on',x===i));rList()}

function rList(){
  const sm={0:'pending',1:'delivering',2:'done'};
  const list=dOrds.filter(o=>o.s===sm[aTab]);
  const el=document.getElementById('oList');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="ic">${aTab===2?'✅':'📭'}</div><div class="tx">${aTab===2?'暂无已完成订单':'暂无待处理订单'}</div></div>`;return}
  el.innerHTML=list.map(o=>{
    let ft='';
    if(o.s==='pending')ft=`<button class="ob ob-nav" onclick="nav('${o.ad}')">🗺️ 导航</button><button class="ob ob-call" onclick="call('${o.ph}')">📞 联系</button><button class="ob ob-go" onclick="startD('${o.id}')">开始配送</button>`;
    else if(o.s==='delivering')ft=`<button class="ob ob-nav" onclick="nav('${o.ad}')">🗺️ 导航</button><button class="ob ob-call" onclick="call('${o.ph}')">📞 联系</button><button class="ob ob-done" onclick="showCfm('${o.id}')">✅ 确认送达</button>`;
    else ft=`<button class="ob ob-gray">回收空桶: ${o.btl||0} 个</button>`;
    return`<div class="oc">
      ${o.urg&&o.s==='pending'?'<div class="oc-urg">⚡ 用户催单，请优先配送</div>':''}
      <div class="oc-hd"><span class="oc-id">${o.id}</span><span class="oc-time">下单 ${o.t}</span></div>
      <div class="oc-bd">
        <div class="oc-cust"><span class="oc-nm">${o.c}</span><span class="oc-ph" onclick="call('${o.ph}')">📞 ${o.ph.replace(/(\d{3})\d{4}(\d{4})/,'$1****$2')}</span></div>
        <div class="oc-addr">📍 ${o.ad}</div>
        <div class="oc-prods">${o.ps.map(p=>`<div class="oc-pr"><span class="oc-pr-n">${p.n}</span><span class="oc-pr-q">×${p.q}</span></div>`).join('')}<div class="oc-pr total"><span>订单金额</span><span>¥${o.am}</span></div></div>
        ${o.nt?`<div class="oc-note">📝 备注：${o.nt}</div>`:''}
      </div>
      <div class="oc-ft">${ft}</div>
    </div>`}).join('');
  updStats()}

function updStats(){
  const pn=dOrds.filter(o=>o.s==='pending').length;
  const dn=dOrds.filter(o=>o.s==='done').length;
  const tb=dOrds.filter(o=>o.s==='done').reduce((s,o)=>s+(o.btl||0),0);
  document.getElementById('sPend').textContent=pn;
  document.getElementById('sDone').textContent=dn;
  document.getElementById('sBtl').textContent=tb;
  document.getElementById('sInc').textContent='¥'+(dn*3);
  const bd=document.getElementById('pBd');bd.textContent=pn;bd.style.display=pn?'inline':'none'}

function startD(id){const o=dOrds.find(x=>x.id===id);if(o){o.s='delivering';rList();toast('🚚 开始配送')}}
function showCfm(id){curId=id;btlCnt=0;document.getElementById('btlN').textContent=0;document.getElementById('cfmMo').classList.add('show')}
function closeCfm(){document.getElementById('cfmMo').classList.remove('show')}
function chgBtl(d){btlCnt=Math.max(0,btlCnt+d);document.getElementById('btlN').textContent=btlCnt}
function cfmDel(){
  const o=dOrds.find(x=>x.id===curId);
  if(o){o.s='done';o.btl=btlCnt}
  closeCfm();rList();toast('✅ 已确认送达，回收 '+btlCnt+' 个空桶')}

function nav(ad){toast('🗺️ 导航至: '+ad)}
function call(ph){toast('📞 拨打: '+ph)}

// Income
function rInc(){
  const dn=dOrds.filter(o=>o.s==='done');
  const tb=dn.reduce((s,o)=>s+(o.btl||0),0);
  document.getElementById('incTotal').textContent=dn.length*3;
  document.getElementById('incOrd').textContent=dn.length;
  document.getElementById('incBtl').textContent=tb;
  document.getElementById('incList').innerHTML=dn.map(o=>`<div class="inc-item"><div class="inc-item-l"><div class="inc-item-id">${o.id}</div><div class="inc-item-info">${o.c} · ${o.ps.map(p=>p.n).join('、')}</div></div><div class="inc-item-am">+¥3.00</div></div>`).join('')||'<div class="empty"><div class="ic">💰</div><div class="tx">今日暂无收入</div></div>'}

// Pages
const dps=['dp-del','dp-inc','dp-my'];
function sPage(i){dps.forEach((p,x)=>document.getElementById(p).classList.toggle('on',x===i));document.querySelectorAll('.bn').forEach((n,x)=>n.classList.toggle('on',x===i));if(i===1)rInc()}

// Online toggle
let isOn=true;
function togOn(){isOn=!isOn;const b=document.getElementById('onBtn');b.className='on-btn '+(isOn?'on':'off');b.textContent=isOn?'● 在线接单':'○ 离线';toast(isOn?'已上线，可接收新订单':'已离线')}

// Toast
