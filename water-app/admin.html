<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>来点好水 · 商家后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#3B82F6;--bd:#1D4ED8;--bl:#EFF6FF;--bg:linear-gradient(135deg,#60A5FA,#2563EB);--g:#10B981;--o:#F59E0B;--r:#EF4444;--f:#F1F5F9;--w:#FFF;--t:#1E293B;--s:#64748B;--m:#94A3B8;--ln:#E2E8F0;--side:#0F172A;--rd:12px;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04)}
body{font-family:-apple-system,'PingFang SC','Segoe UI',sans-serif;background:var(--f);color:var(--t)}
.lay{display:flex;min-height:100vh}
.side{width:240px;background:var(--side);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}.side::-webkit-scrollbar{width:0}
.s-logo{height:64px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:18px;font-weight:800;border-bottom:1px solid rgba(255,255,255,.06)}
.s-menu{padding:12px 0}.s-group{padding:20px 20px 8px;font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:2px;font-weight:700}
.s-item{display:flex;align-items:center;gap:10px;padding:11px 24px;cursor:pointer;color:rgba(255,255,255,.55);transition:.2s;font-size:14px;position:relative;border-radius:0 8px 8px 0;margin-right:12px}
.s-item:hover{color:#fff;background:rgba(255,255,255,.06)}.s-item.on{color:#fff;background:var(--b);box-shadow:0 4px 12px rgba(59,130,246,.3)}
.s-item .ic{font-size:16px;width:20px;text-align:center}.s-item .bd{position:absolute;right:20px;background:var(--r);color:#fff;font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;font-weight:700}
.mn{margin-left:240px;flex:1}
.hdr{height:64px;background:rgba(255,255,255,.8);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--ln);position:sticky;top:0;z-index:50}
.hdr-t{font-size:16px;font-weight:700}.hdr-r{display:flex;align-items:center;gap:16px}.hdr-time{font-size:13px;color:var(--m)}
.notif{position:relative;cursor:pointer;font-size:20px}.notif-d{position:absolute;top:-1px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--r)}
.cnt{padding:28px}
.pg-s{display:none}.pg-s.on{display:block}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.st{background:var(--w);border-radius:var(--rd);padding:22px 20px;box-shadow:var(--sh);position:relative;overflow:hidden}
.st::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.08}
.st.c1::before{background:var(--b)}.st.c2::before{background:var(--g)}.st.c3::before{background:var(--o)}.st.c4::before{background:var(--r)}
.st-l{font-size:13px;color:var(--m);font-weight:500}.st-v{font-size:34px;font-weight:800;margin:8px 0 4px}
.st.c1 .st-v{color:var(--b)}.st.c2 .st-v{color:var(--g)}.st.c3 .st-v{color:var(--o)}.st.c4 .st-v{color:var(--r)}
.st-c{font-size:12px;color:var(--g);font-weight:600}.st-c.dn{color:var(--r)}
/* Card, Table */
.cd{background:var(--w);border-radius:var(--rd);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.cd-h{padding:18px 22px;border-bottom:1px solid var(--ln);display:flex;align-items:center;justify-content:space-between}.cd-t{font-size:15px;font-weight:700}.cd-b{padding:22px}
.tw{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#F8FAFC;font-weight:700;text-align:left;padding:13px 18px;border-bottom:1px solid var(--ln);white-space:nowrap;color:var(--s);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
td{padding:13px 18px;border-bottom:1px solid var(--ln)}tr:hover td{background:#FAFBFC}
.tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700}
.tag-pend{background:#FEF3C7;color:#92400E}.tag-del{background:var(--bl);color:var(--bd)}.tag-done{background:#D1FAE5;color:#065F46}.tag-cancel{background:#FEE2E2;color:#991B1B}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:.15s}.btn:active{transform:scale(.96)}
.btn-p{background:var(--bg);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.2)}.btn-g{background:var(--g);color:#fff}.btn-d{background:var(--r);color:#fff}.btn-o{background:transparent;border:1.5px solid var(--ln);color:var(--s)}.btn-o:hover{border-color:var(--b);color:var(--b)}
.btn-s{padding:5px 12px;font-size:12px}
.sel{padding:8px 14px;border:1.5px solid var(--ln);border-radius:8px;font-size:13px;background:var(--w);outline:none;font-weight:500}
.sel:focus{border-color:var(--b)}
.tlb{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}.tlb-l,.tlb-r{display:flex;align-items:center;gap:8px}
/* Alert */
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.01)}}
.alert{background:linear-gradient(135deg,#FCA5A5,#EF4444);color:#fff;padding:14px 22px;border-radius:var(--rd);margin-bottom:20px;display:none;align-items:center;justify-content:space-between;animation:pulse 2.5s infinite;box-shadow:0 4px 16px rgba(239,68,68,.2)}
.alert.show{display:flex}.alert-t{font-size:14px;font-weight:700}
/* Grid */
.g2{display:grid;grid-template-columns:2fr 1fr;gap:16px}.g22{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
/* Rank */
.rk-i{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--ln)}.rk-i:last-child{border:none}
.rk-n{width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#F1F5F9;color:#94A3B8}
.rk-i:nth-child(1) .rk-n{background:#FBBF24;color:#fff}.rk-i:nth-child(2) .rk-n{background:#94A3B8;color:#fff}.rk-i:nth-child(3) .rk-n{background:#CD7F32;color:#fff}
.rk-info{flex:1}.rk-nm{font-size:13px;font-weight:600}.rk-sl{font-size:12px;color:var(--m)}
/* Chart */
.chart{height:220px;display:flex;align-items:flex-end;gap:10px;padding:0 8px}
.bar{border-radius:6px 6px 0 0;transition:height .6s;position:relative;flex:1}
.bar::after{content:attr(data-v);position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--m);font-weight:600}
.bar-lb{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--m);white-space:nowrap}
.info-r{display:flex;padding:9px 0;font-size:14px}.info-l{width:100px;color:var(--m);flex-shrink:0;font-weight:500}.info-v{flex:1}
/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,23,42,.82);color:#fff;padding:14px 28px;border-radius:12px;font-size:14px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;backdrop-filter:blur(8px)}
/* Sound */
.ring{display:none}
@media(max-width:1200px){.stats{grid-template-columns:repeat(2,1fr)}.g2,.g22{grid-template-columns:1fr}}
@media(max-width:768px){.side{width:64px}.s-logo span,.s-item .tx,.s-group,.s-item .bd{display:none}.mn{margin-left:64px}.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="lay">
  <div class="side">
    <div class="s-logo">💧 <span>来点好水</span></div>
    <div class="s-menu">
      <div class="s-group">概览</div>
      <div class="s-item on" onclick="sp('dash',this)"><span class="ic">📊</span><span class="tx">数据看板</span></div>
      <div class="s-group">业务</div>
      <div class="s-item" onclick="sp('ord',this)" id="ordMenuItem"><span class="ic">📋</span><span class="tx">订单管理</span><span class="bd" id="oBadge">0</span></div>
      <div class="s-item" onclick="sp('drv',this)"><span class="ic">🚚</span><span class="tx">配送管理</span></div>
      <div class="s-group">运营</div>
      <div class="s-item" onclick="sp('set',this)"><span class="ic">⚙️</span><span class="tx">系统设置</span></div>
    </div>
  </div>
  <div class="mn">
    <div class="hdr"><div class="hdr-t" id="pgT">数据看板</div><div class="hdr-r"><div class="hdr-time" id="clock"></div><div class="notif" onclick="sp('ord',document.getElementById('ordMenuItem'))">🔔<div class="notif-d" id="notifDot"></div></div><div>👤 管理员</div></div></div>
    <div class="cnt">
      <div class="alert" id="alertBox"><span class="alert-t" id="alertText">🔔 有新订单待处理！</span><button class="btn btn-o" style="color:#fff;border-color:rgba(255,255,255,.5)" onclick="sp('ord',document.getElementById('ordMenuItem'));this.parentElement.classList.remove('show')">立即处理</button></div>
      <!-- Dashboard -->
      <div class="pg-s on" id="s-dash">
        <div class="stats">
          <div class="st c1"><div class="st-l">今日订单</div><div class="st-v" id="dTotalOrd">0</div><div class="st-c">实时更新</div></div>
          <div class="st c2"><div class="st-l">今日营收</div><div class="st-v" id="dTotalRev">¥0</div><div class="st-c">实时更新</div></div>
          <div class="st c3"><div class="st-l">已完成</div><div class="st-v" id="dDoneOrd">0</div><div class="st-c">配送完成</div></div>
          <div class="st c4"><div class="st-l">待处理</div><div class="st-v" id="dPendOrd">0</div><div class="st-c dn" id="dPendTip">需尽快处理</div></div>
        </div>
        <div class="g2">
          <div class="cd"><div class="cd-h"><span class="cd-t">📈 近 7 日趋势</span></div><div class="cd-b"><div class="chart" id="chartEl"></div></div></div>
          <div class="cd"><div class="cd-h"><span class="cd-t">🏆 热销 Top 5</span></div><div class="cd-b" id="rankEl"></div></div>
        </div>
        <div class="g22">
          <div class="cd"><div class="cd-h"><span class="cd-t">🚚 配送时效</span></div><div class="cd-b"><div class="info-r"><span class="info-l">平均时长</span><span class="info-v" style="font-weight:800;color:var(--g)">38 分钟</span></div><div class="info-r"><span class="info-l">达标率</span><span class="info-v" style="font-weight:700">87.2%</span></div><div class="info-r"><span class="info-l">在线配送员</span><span class="info-v">3 人</span></div></div></div>
          <div class="cd"><div class="cd-h"><span class="cd-t">👥 客户概览</span></div><div class="cd-b"><div class="info-r"><span class="info-l">总客户</span><span class="info-v" style="font-weight:800">1,286</span></div><div class="info-r"><span class="info-l">月复购率</span><span class="info-v" style="font-weight:700">63.5%</span></div></div></div>
        </div>
      </div>
      <!-- Orders -->
      <div class="pg-s" id="s-ord">
        <div class="tlb"><div class="tlb-l"><select class="sel" id="oFlt" onchange="rOrd()"><option value="all">全部订单</option><option value="pending">待接单</option><option value="delivering">配送中</option><option value="done">已完成</option></select></div><div class="tlb-r"><span style="font-size:13px;color:var(--m)">共 <b id="oCnt">0</b> 笔</span></div></div>
        <div class="cd"><div class="tw"><table><thead><tr><th>订单号</th><th>客户</th><th>商品</th><th>金额</th><th>时间</th><th>状态</th><th>配送员</th><th>操作</th></tr></thead><tbody id="oTb"></tbody></table></div></div>
      </div>
      <!-- Delivery -->
      <div class="pg-s" id="s-drv">
        <div class="cd"><div class="cd-h"><span class="cd-t">配送员列表</span></div><div class="tw"><table><thead><tr><th>姓名</th><th>手机</th><th>状态</th><th>今日单数</th></tr></thead><tbody id="dTb"></tbody></table></div></div>
      </div>
      <!-- Settings -->
      <div class="pg-s" id="s-set">
        <div class="g22" style="margin-top:0">
          <div class="cd"><div class="cd-h"><span class="cd-t">🏪 店铺信息</span></div><div class="cd-b"><div style="margin-bottom:14px"><label style="font-size:12px;color:var(--s);font-weight:600;display:block;margin-bottom:6px">店铺名称</label><input style="width:100%;padding:9px 14px;border:1.5px solid var(--ln);border-radius:8px;font-size:14px" value="来点好水"></div><div style="margin-bottom:14px"><label style="font-size:12px;color:var(--s);font-weight:600;display:block;margin-bottom:6px">营业时间</label><input style="width:100%;padding:9px 14px;border:1.5px solid var(--ln);border-radius:8px;font-size:14px" value="07:00 - 21:00"></div><button class="btn btn-p" onclick="toast('已保存')">保存</button></div></div>
          <div class="cd"><div class="cd-h"><span class="cd-t">💰 费用设置</span></div><div class="cd-b"><div style="margin-bottom:14px"><label style="font-size:12px;color:var(--s);font-weight:600;display:block;margin-bottom:6px">配送费(元)</label><input style="width:100%;padding:9px 14px;border:1.5px solid var(--ln);border-radius:8px;font-size:14px" value="5"></div><div style="margin-bottom:14px"><label style="font-size:12px;color:var(--s);font-weight:600;display:block;margin-bottom:6px">免配送费门槛(桶)</label><input style="width:100%;padding:9px 14px;border:1.5px solid var(--ln);border-radius:8px;font-size:14px" value="2"></div><button class="btn btn-p" onclick="toast('已保存')">保存</button></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toastEl"></div>
<script src="shared.js"></script>
<script>
const ttl={dash:'数据看板',ord:'订单管理',drv:'配送管理',set:'系统设置'};
const sMap={pending:['待接单','tag-pend'],delivering:['配送中','tag-del'],done:['已完成','tag-done']};

function sp(p,el){document.querySelectorAll('.pg-s').forEach(s=>s.classList.remove('on'));document.getElementById('s-'+p).classList.add('on');document.querySelectorAll('.s-item').forEach(m=>m.classList.remove('on'));if(el)el.classList.add('on');document.getElementById('pgT').textContent=ttl[p]||p;if(p==='ord')rOrd();if(p==='dash')rDash();if(p==='drv')rDrv()}
function toast(m){const t=document.getElementById('toastEl');t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1500)}

function rDash(){
  const data=loadData();
  const ords=data.orders;
  const total=ords.length,rev=ords.reduce((s,o)=>s+o.amount,0),done=ords.filter(o=>o.status==='done').length,pend=ords.filter(o=>o.status==='pending').length;
  document.getElementById('dTotalOrd').textContent=total;
  document.getElementById('dTotalRev').textContent='¥'+rev.toLocaleString();
  document.getElementById('dDoneOrd').textContent=done;
  document.getElementById('dPendOrd').textContent=pend;
  document.getElementById('dPendTip').textContent=pend?'需尽快处理':'全部已处理 ✅';
  document.getElementById('dPendTip').className='st-c'+(pend?' dn':'');
  // Badge
  document.getElementById('oBadge').textContent=pend;
  document.getElementById('oBadge').style.display=pend?'flex':'none';
  document.getElementById('notifDot').style.display=pend?'block':'none';
  // Alert
  const al=document.getElementById('alertBox');
  if(pend>0){document.getElementById('alertText').textContent=`🔔 您有 ${pend} 笔新订单待处理！`;al.classList.add('show')}else{al.classList.remove('show')}
  rChart();rRank()
}

function rOrd(){
  const data=loadData();const f=document.getElementById('oFlt').value;
  const list=f==='all'?data.orders:data.orders.filter(o=>o.status===f);
  document.getElementById('oCnt').textContent=list.length;
  document.getElementById('oTb').innerHTML=list.map(o=>{
    const[lb,cl]=sMap[o.status]||['未知',''];
    const prods=getOrderProducts(o);
    const prodText=prods.map(p=>p.name+'×'+p.qty).join(', ');
    const driver=o.driver?getDriver(o.driver):null;
    let ac='';
    if(o.status==='pending')ac=`<button class="btn btn-s btn-g" onclick="acceptOrd('${o.id}')">接单</button> <button class="btn btn-s btn-d" onclick="rejectOrd('${o.id}')">拒单</button>`;
    else if(o.status==='delivering')ac=`<span style="font-size:12px;color:var(--b)">配送中</span>`;
    else ac=`<span style="font-size:12px;color:var(--g)">✅</span>`;
    return`<tr><td style="font-weight:600">${o.id}</td><td>${o.customer}</td><td style="max-width:200px">${prodText}</td><td style="font-weight:700">¥${o.amount}</td><td>${o.time}</td><td><span class="tag ${cl}">${lb}</span></td><td>${driver?driver.name:'-'}</td><td>${ac}</td></tr>`
  }).join('')}

function acceptOrd(id){
  // 接单 + 自动派单给小陈
  updateOrderStatus(id,'delivering',{driver:'d1'});
  rOrd();rDash();toast('✅ 已接单，派单给小陈')
}
function rejectOrd(id){
  updateOrderStatus(id,'done',{});
  rOrd();rDash();toast('已拒单')
}

function rDrv(){
  const data=loadData();
  document.getElementById('dTb').innerHTML=DRIVERS.map(d=>{
    const cnt=data.orders.filter(o=>o.driver===d.id&&o.status==='done').length;
    const delivering=data.orders.filter(o=>o.driver===d.id&&o.status==='delivering').length;
    const status=delivering>0?'配送中':'空闲';
    const stCl=delivering>0?'tag-del':'tag-done';
    return`<tr><td style="font-weight:600">${d.name}</td><td>${d.phone}</td><td><span class="tag ${stCl}">${status}</span></td><td>${cnt}单</td></tr>`
  }).join('')}

function rChart(){const d=[32,28,45,38,42,35,loadData().orders.length],lb=['周一','周二','周三','周四','周五','周六','今日'],mx=Math.max(...d);document.getElementById('chartEl').innerHTML=d.map((v,i)=>{const h=v/mx*180;const cl=i===d.length-1?'var(--bg)':'linear-gradient(180deg,#93C5FD,#BFDBFE)';return`<div class="bar" style="height:${h}px;background:${cl}" data-v="${v}"><span class="bar-lb">${lb[i]}</span></div>`}).join('')}
function rRank(){const top=[{n:'娃哈哈 纯净水',s:5102},{n:'怡宝 纯净水',s:4210},{n:'农夫山泉 天然水',s:3826},{n:'百岁山 矿泉水',s:2914},{n:'怡宝 555ml×24',s:2100}];document.getElementById('rankEl').innerHTML=top.map((r,i)=>`<div class="rk-i"><div class="rk-n">${i+1}</div><div class="rk-info"><div class="rk-nm">${r.n}</div><div class="rk-sl">累计 ${r.s} 件</div></div></div>`).join('')}

function tick(){document.getElementById('clock').textContent=new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'})}

// Sync: when user places order, auto-refresh
onDataChange(function(){rDash();if(document.getElementById('s-ord').classList.contains('on'))rOrd();if(document.getElementById('s-drv').classList.contains('on'))rDrv()});

rDash();rOrd();rDrv();tick();setInterval(tick,1000)
</script>
</body>
</html>
