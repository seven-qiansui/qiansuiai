<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案例投票 - 千岁 AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .vote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .vote-card{background:var(--card-bg,#fff);border:2px solid var(--border-color,#e8e4df);border-radius:16px;overflow:hidden;transition:all .3s}
        .vote-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.1);border-color:var(--primary-color,#c0392b)}
        .vote-image{aspect-ratio:4/3;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .vote-image img{width:100%;height:100%;object-fit:cover}
        .vote-info{padding:16px}
        .vote-info h3{font-size:16px;font-weight:700;margin-bottom:8px}
        .vote-info p{font-size:13px;color:#888;margin-bottom:12px;line-height:1.5}
        .vote-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        .vote-progress{flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}
        .vote-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary-color,#c0392b),#e74c3c);border-radius:4px;transition:width .5s}
        .vote-count{font-size:13px;font-weight:700;color:var(--primary-color,#c0392b);white-space:nowrap}
        .vote-btn{width:100%;padding:10px;border-radius:10px;border:2px solid var(--primary-color,#c0392b);background:none;color:var(--primary-color,#c0392b);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
        .vote-btn:hover{background:var(--primary-color,#c0392b);color:#fff}
        .vote-btn.voted{background:var(--primary-color,#c0392b);color:#fff;cursor:default}
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar fade-in">
            <div class="nav-brand">🤖 千岁 AI</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="diary.html" class="nav-link">创作站</a>
                <a href="gallery.html" class="nav-link">相册</a>
                <a href="video.html" class="nav-link">视频</a>
                <a href="news.html" class="nav-link">资讯</a>
            </div>
        </nav>

        <header class="page-header fade-in">
            <div class="page-icon">📊</div>
            <h1>案例投票</h1>
            <p class="page-subtitle">为你喜欢的作品投票，帮我们做得更好</p>
        </header>

        <section class="section fade-on-scroll">
            <div class="vote-grid" id="voteGrid">
                <!-- 占位案例 - 运营专员填充 -->
                <div class="vote-card">
                    <div class="vote-image">
                        <div style="font-size:64px">💎</div>
                    </div>
                    <div class="vote-info">
                        <h3>和平之翼 · 翡翠珠宝系列</h3>
                        <p>融合东方美学与现代设计的珠宝创作</p>
                        <div class="vote-bar">
                            <div class="vote-progress"><div class="vote-progress-fill" style="width:72%"></div></div>
                            <span class="vote-count">36 票</span>
                        </div>
                        <button class="vote-btn" onclick="doVote(this)">👍 投一票</button>
                    </div>
                </div>

                <div class="vote-card">
                    <div class="vote-image">
                        <div style="font-size:64px">🛒</div>
                    </div>
                    <div class="vote-info">
                        <h3>护肤品电商视觉方案</h3>
                        <p>清新简约风格的主图+详情页设计</p>
                        <div class="vote-bar">
                            <div class="vote-progress"><div class="vote-progress-fill" style="width:58%"></div></div>
                            <span class="vote-count">29 票</span>
                        </div>
                        <button class="vote-btn" onclick="doVote(this)">👍 投一票</button>
                    </div>
                </div>

                <div class="vote-card">
                    <div class="vote-image">
                        <div style="font-size:64px">📱</div>
                    </div>
                    <div class="vote-info">
                        <h3>小红书美妆种草系列</h3>
                        <p>美妆类目内容策划与笔记撰写</p>
                        <div class="vote-bar">
                            <div class="vote-progress"><div class="vote-progress-fill" style="width:45%"></div></div>
                            <span class="vote-count">22 票</span>
                        </div>
                        <button class="vote-btn" onclick="doVote(this)">👍 投一票</button>
                    </div>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>© 2026 千岁 AI · Powered by OpenClaw</p>
            <p class="footer-note">电商视觉 · 社媒运营 · 企业 AI 服务</p>
        </footer>

        <button class="back-to-top" id="backToTop" aria-label="回到顶部">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 15l-6-6-6 6"/>
            </svg>
        </button>
    </div>

    <script>
        function doVote(btn) {
            if (btn.classList.contains('voted')) return;
            btn.classList.add('voted');
            btn.textContent = '✅ 已投票';
            const countEl = btn.parentElement.querySelector('.vote-count');
            const current = parseInt(countEl.textContent);
            countEl.textContent = (current + 1) + ' 票';
            const fill = btn.parentElement.querySelector('.vote-progress-fill');
            const newWidth = Math.min(parseInt(fill.style.width) + 2, 100);
            fill.style.width = newWidth + '%';
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
        document.querySelectorAll('.fade-on-scroll').forEach(el => observer.observe(el));

        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => { backToTop.classList.toggle('visible', window.scrollY > 300); });
        backToTop.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });

        window.addEventListener('load', () => { document.body.classList.add('loaded'); });
    </script>
</body>
</html>
